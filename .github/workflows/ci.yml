name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          set -o pipefail
          go test -v -race -count=1 -coverprofile=coverage.out ./... 2>&1 | tee test-output.txt

      - name: Annotate test failures
        if: failure()
        run: |
          echo "### Failed tests:"
          grep -E "^--- FAIL:" test-output.txt | while read line; do
            test_name=$(echo "$line" | awk '{print $3}')
            echo "::error::${test_name} failed"
            echo "  ✗ ${test_name}"
          done
          echo ""
          echo "### FAIL output:"
          grep -B5 "^--- FAIL:" test-output.txt

      - name: Check coverage threshold
        run: |
          threshold=80
          echo "## Per-package coverage"
          echo ""
          go tool cover -func=coverage.out | grep -E '^[a-z]' | awk '{print $1, $NF}' | while read pkg pct; do
            num=$(echo "$pct" | tr -d '%')
            if [ "$(echo "${num} < ${threshold}" | bc -l)" -eq 1 ]; then
              echo "::warning file=${pkg}::${pkg} coverage is ${pct} (below ${threshold}%)"
              echo "  ⚠ ${pkg} ${pct}"
            else
              echo "  ✓ ${pkg} ${pct}"
            fi
          done
          echo ""
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "## Total coverage: ${total}%"
          echo ""
          echo "### Functions below ${threshold}%"
          go tool cover -func=coverage.out | awk -v t="${threshold}" '{
            pct = $NF; gsub(/%/, "", pct);
            if (pct+0 < t+0 && $1 !~ /^total:/) print "  " $1 ":" $2 " " $(NF-1) " " $NF
          }'
          echo ""
          if [ "$(echo "${total} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Total coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w \
            -X github.com/oragazz0/viy/internal/version.Version=${VERSION} \
            -X github.com/oragazz0/viy/internal/version.Commit=${COMMIT} \
            -X github.com/oragazz0/viy/internal/version.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o viy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/viy

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: viy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: viy-${{ matrix.goos }}-${{ matrix.goarch }}
